name: X Tracker to Discord

on:
  workflow_dispatch:

concurrency:
  group: x-tracker
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  post-tweets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests git+https://github.com/JustAnotherArchivist/snscrape.git

      - name: Fetch X posts and post
        env:
          DISCORD_WEBHOOK_URL_TRENDSPIDER: ${{ secrets.DISCORD_WEBHOOK_URL_TRENDSPIDER }}
          DISCORD_WEBHOOK_URL_COLE: ${{ secrets.DISCORD_WEBHOOK_URL_COLE }}
          DISCORD_WEBHOOK_URL_SPECUYCKY: ${{ secrets.DISCORD_WEBHOOK_URL_SPECUYCKY }}
        run: python x_tracker.py

      - name: Save state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add seen_x.json
          git diff --cached --quiet && exit 0
          git commit -m "Update X tracker state"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && exit 0
            sleep $((RANDOM % 5 + 1))
          done
          exit 1
