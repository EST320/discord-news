name: Weekly Earnings Calendar to Discord

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  post-earnings:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests plotly kaleido

      - name: Fetch and post earnings calendar
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          DISCORD_WEBHOOK_URL_EARNINGS: ${{ secrets.DISCORD_WEBHOOK_URL_EARNINGS }}
        run: python earnings_calendar.py
