name: Wallstreetcn HK-Stock to Discord

on:
  workflow_dispatch:

concurrency:
  group: wallstreetcn-hk-stock
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  post-live:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch HK-stock live news and post
        env:
          DISCORD_WEBHOOK_URL_HK: ${{ secrets.DISCORD_WEBHOOK_URL_HK }}
        run: python main_hk.py

      - name: Save state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add seen_hk.json
          git diff --cached --quiet || (
            git commit -m "Update HK-stock state" &&
            git pull --rebase origin main &&
            git push
          )
