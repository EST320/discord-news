name: Trump Truth Tracker to Discord

on:
  schedule:
    - cron: "*/2 * * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: trump-truth-tracker
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  post-trump-truth:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests deepl Pillow

      - name: Fetch Trump posts and send to Discord
        env:
          DISCORD_WEBHOOK_URL_TRUMP: ${{ secrets.DISCORD_WEBHOOK_URL_TRUMP }}
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: python trump_tracker.py

      - name: Save tracker state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add seen_trump.json
          git diff --cached --quiet && exit 0

          git commit -m "Update Trump tracker state"

          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && exit 0
            sleep $((RANDOM % 5 + 1))
          done

          exit 1
