name: Wallstreetcn A-Stock to Discord

on:
  workflow_dispatch:

concurrency:
  group: wallstreetcn-a-stock
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  post-live:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch A-stock live news and post
        env:
          DISCORD_WEBHOOK_URL_A: ${{ secrets.DISCORD_WEBHOOK_URL_A }}
        run: python main_a.py

      - name: Save state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add seen_a.json
          git diff --cached --quiet && exit 0
          git commit -m "Update A-stock state"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && exit 0
            sleep $((RANDOM % 5 + 1))
          done
          exit 1
